[tool.pytest.ini_options]
# Config mínima para a primeira suíte pytest do app-redator (Fase 1 BO V2).
# Comando de execução: cd app-redator && pytest tests/ -v
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-ra --strict-markers"
filterwarnings = [
    "ignore::DeprecationWarning:google.*",
    "ignore::DeprecationWarning:pkg_resources.*",
]
